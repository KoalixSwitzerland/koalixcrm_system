user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 100M;

    access_log  /var/log/nginx/access.log;

    upstream django_upstream {
        server backend:8000;
    }

    # --- Main server: reverse proxy for Django (port 80 + 5000) ---
    # Port 80: standard internal access (mapped to host:5000 via docker-compose)
    # Port 5000: allows E2E browser (inside Docker) to reach nginx at localhost:5000
    server {
        listen 80;
        listen 5000;
        server_name _;

        # --- Django admin ---
        location /admin {
            proxy_pass http://django_upstream;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        # --- Grappelli admin theme ---
        location /grappelli/ {
            proxy_pass http://django_upstream;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        # --- Static files from Django (collectstatic) ---
        location /static/ {
            proxy_pass http://django_upstream;
            proxy_set_header Host $http_host;
        }

        # --- E2E test-only routes ---
        location /__test__/ {
            proxy_pass http://django_upstream;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        # --- Catch-all: Django ---
        location / {
            proxy_pass http://django_upstream;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # --- Allure report server (port 8080) ---
    # Serves the generated allure HTML report for e2e test results.
    # Accessible at http://localhost:5001/
    server {
        listen 8080;
        server_name _;

        location / {
            alias /usr/share/nginx/allure-report/;
            autoindex on;
            try_files $uri $uri/ =404;
        }
    }
}
