# ElasticMQ configuration — local SQS-compatible message broker
# Used in docker-compose.yml for local development
include classpath("application.conf")

node-address {
  protocol = http
  host = "*"
  port = 9324
  context-path = ""
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
  sqs-limits = strict
}

queues {
  koalixcrm-celery-sqs { }
  koalixcrm-microservice-sqs { }
}
