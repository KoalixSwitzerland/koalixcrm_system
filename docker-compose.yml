# =============================================================================
# docker-compose.yml — Unified test & dev environment for KoalixCRM
#
# Single entrypoint for all testing and development.
#
# Local service replacements:
#   S3   -> MinIO      (API ${MINIO_API_PORT:-9010}, console ${MINIO_CONSOLE_PORT:-9011})
#   SQS  -> ElasticMQ  (API 9324, UI 9325)
#   DB   -> SQLite     (file-based, mounted from host)
#   OIDC -> Disabled locally (no Keycloak — see ADR: internal/external URL mismatch
#           in safety-critical auth code makes local Keycloak unreliable)
#
# Profiles:
#   unit-django            — Django backend unit tests (SQLite, mocked externals)
#   unit-celery            — Celery microservice unit tests (mocked externals)
#   unit-pdf-service       — Java pdf-export-service unit tests (fast, no infra)
#   integration            — Backend + pdf-service (Java) + infra (SQLite, MinIO, ElasticMQ)
#   integration-pdf-service — Java pdf-export-service integration tests (Testcontainers:
#                             LocalStack + WireMock spawned via the host Docker socket)
#   e2e                    — Full stack + Selenium + allure report
#   dev                    — Long-running dev environment with auto-reload
#   legacy-celery          — Bring up the deprecated Python Celery worker (kept during
#                            migration for rollback; will be removed in koalixcrm#386 stage 5)
#
# Environment variables (set in .env.<yourname>):
#   KOALIXCRM_DIR       — Absolute path to koalixcrm repo        (shell-readable)
#   KOALIXCRM_DB_DIR    — Absolute path to DB/secrets directory   (shell-readable)
#   KOALIXCRM_SYSTEM_DIR — Absolute path to this repo             (shell-readable, default: .)
#   KOALIXCRM_FOP_DIR   — Absolute path to koalixcrm-fop-service repo
#                         (only needed for unit-pdf-service / integration-pdf-service
#                          profiles; default: ./../koalixcrm-fop-service)
#   PDF_SERVICE_IMAGE_TAG — Container tag to pull for the pdf-service (e.g.
#                           `v2.0.0`, `develop`, `sha-abc1234`). Default: `develop`.
#                           Pin to a concrete version in production .env files.
#
# Optional daemon-side overrides (only set if your shell and Docker daemon
# see different filesystem paths — e.g. WSL shell + Docker Desktop on Windows):
#   KOALIXCRM_HOST_DIR        — defaults to KOALIXCRM_DIR
#   KOALIXCRM_DB_HOST_DIR     — defaults to KOALIXCRM_DB_DIR
#   KOALIXCRM_SYSTEM_HOST_DIR — defaults to KOALIXCRM_SYSTEM_DIR
#   KOALIXCRM_FOP_HOST_DIR    — defaults to KOALIXCRM_FOP_DIR
#
# Secrets:
#   All secrets (OIDC credentials if needed for cloud, API keys) are loaded
#   from ${KOALIXCRM_DB_DIR}/secrets.env — see docker/secrets.env.example.
#   This is the ONLY place where secrets live; everything else is inlined.
#
# Developer env files:
#   Each developer maintains their own .env.<name> file (gitignored).
#   Copy .env.example to .env.<yourname> and adjust paths for your machine.
#   Always pass --env-file so docker compose knows which config to use.
#
# Usage:
#   # Unit tests (selective: append pytest/gradle command to override CMD)
#   docker compose --env-file .env.aaron --profile unit-django run --rm unit-django-runner
#   docker compose --env-file .env.aaron --profile unit-django run --rm unit-django-runner pytest tests/accounting -v
#   docker compose --env-file .env.aaron --profile unit-celery run --rm unit-celery-runner
#   docker compose --env-file .env.aaron --profile unit-pdf-service run --rm unit-pdf-service-runner
#
#   # Integration tests
#   docker compose --env-file .env.aaron --profile integration run --rm integration-runner
#   docker compose --env-file .env.aaron --profile integration run --rm integration-runner pytest tests/crm_api_py -v
#   docker compose --env-file .env.aaron --profile integration-pdf-service run --rm integration-pdf-service-runner
#
#   # E2E tests
#   docker compose --env-file .env.aaron --profile e2e run --rm e2e-runner
#   docker compose --env-file .env.aaron --profile e2e run --rm e2e-runner pytest tests/e2e/test_create_sales_document_from_quote.py -v
#
#   # Dev (manual testing with auto-reload)
#   docker compose --env-file .env.aaron --profile dev up --build
#
#   # Teardown any profile
#   docker compose --env-file .env.aaron --profile <profile> down -v
# =============================================================================


# --- Infrastructure services (shared by integration, e2e, dev) ---------------

services:

  # --- MinIO (S3-compatible object storage) ---
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "${MINIO_API_PORT:-9010}:9000"
      - "${MINIO_CONSOLE_PORT:-9011}:9001"
    volumes:
      - minio_data:/data
    networks:
      - koalixcrm-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    profiles: [integration, e2e, dev, legacy-celery]

  # --- MinIO bucket setup (runs once, creates buckets, exits) ---
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123 &&
        mc mb --ignore-existing local/koalixcrm-pdf-exports &&
        echo 'Buckets created successfully.'
      "
    networks:
      - koalixcrm-net
    profiles: [integration, e2e, dev, legacy-celery]

  # --- ElasticMQ (SQS-compatible message broker) ---
  elasticmq:
    image: softwaremill/elasticmq-native:latest
    ports:
      - "${ELASTICMQ_PORT:-9324}:9324"   # SQS API
      - "${ELASTICMQ_UI_PORT:-9325}:9325"   # Web UI
    volumes:
      - ${KOALIXCRM_SYSTEM_HOST_DIR:-${KOALIXCRM_SYSTEM_DIR:-.}}/docker/elasticmq.conf:/opt/elasticmq.conf:ro
    networks:
      - koalixcrm-net
    profiles: [integration, e2e, dev, legacy-celery]


# --- Application services ----------------------------------------------------

  # --- Django backend server ---
  backend:
    build:
      context: ${KOALIXCRM_DIR:-./../koalixcrm}
      dockerfile: docker/dev/Dockerfile.django
    env_file:
      - path: ${KOALIXCRM_DB_DIR:-./../koalixcrm_data}/secrets.env
        required: true
    environment:
      # --- Django Core ---
      - DJANGO_SETTINGS_MODULE=projectsettings.settings.development_docker_settings
      - DJANGO_DEBUG=True
      - DJANGO_SECRET_KEY=django-insecure-local-dev-key-DO-NOT-USE-IN-PRODUCTION
      - ALLOWED_HOSTS=localhost,backend,host.docker.internal,127.0.0.1
      - PYTHONUNBUFFERED=1
      # --- i18n ---
      - KOALIXCRM_LANGUAGE_CODE=${KOALIXCRM_LANGUAGE_CODE:-en-us}
      # --- Database (SQLite) ---
      - DB_CHOICE=sqlite3
      - SQLITE_DB_FILE=/db/db.sqlite3
      # --- Local S3 (MinIO) ---
      - S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin123
      - AWS_REGION=us-east-1
      - S3_PDF_BUCKET=koalixcrm-pdf-exports
      # --- Local SQS (ElasticMQ) ---
      - SQS_ENDPOINT_URL=http://elasticmq:9324
      - KOALIXCRM_MICROSERVICE_SQS=koalixcrm-microservice-sqs
      - CELERY_SQS=koalixcrm-celery-sqs
      - CELERY_BROKER_URL=sqs://dummy:dummy@elasticmq:9324
      - POLL_SLEEP_SECONDS=2
      - ENABLE_SQS_POLLER=true
      # --- Auth (cloud Keycloak for admin login, secrets from secrets.env) ---
      - SITE_URL=http://localhost:${DJANGO_PORT:-8000}
      # --- E2E test-only routes ---
      - E2E_TESTING=true
      - E2E_SECRET=local-e2e-secret
    expose:
      - "8000"
    ports:
      - "${DJANGO_PORT:-8000}:8000"
    volumes:
      - ${KOALIXCRM_HOST_DIR:-${KOALIXCRM_DIR:-./../koalixcrm}}:/usr/src/app
      - ${KOALIXCRM_DB_HOST_DIR:-${KOALIXCRM_DB_DIR:-./../koalixcrm_data}}/db:/db
    working_dir: /usr/src/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      minio-setup:
        condition: service_completed_successfully
      elasticmq:
        condition: service_started
    networks:
      koalixcrm-net:
        aliases:
          - backend
    profiles: [e2e, dev, legacy-celery]

  # --- Django backend server (integration profile) ---
  # Runs only under the `integration` profile and uses a dedicated SQLite file
  # (/db/integration.sqlite3) so tests never depend on the state of the shared
  # dev DB. Keeps the `backend` network alias so tests / other containers can
  # resolve it by the same hostname. On first boot the entrypoint runs
  # sync_split_migrations + migrate on an empty file, producing a clean schema.
  backend-integration:
    build:
      context: ${KOALIXCRM_DIR:-./../koalixcrm}
      dockerfile: docker/dev/Dockerfile.django
    env_file:
      - path: ${KOALIXCRM_DB_DIR:-./../koalixcrm_data}/secrets.env
        required: true
    environment:
      # --- Django Core ---
      - DJANGO_SETTINGS_MODULE=projectsettings.settings.development_docker_settings
      - DJANGO_DEBUG=True
      - DJANGO_SECRET_KEY=django-insecure-local-dev-key-DO-NOT-USE-IN-PRODUCTION
      - ALLOWED_HOSTS=localhost,backend,host.docker.internal,127.0.0.1
      - PYTHONUNBUFFERED=1
      # --- i18n ---
      - KOALIXCRM_LANGUAGE_CODE=${KOALIXCRM_LANGUAGE_CODE:-en-us}
      # --- Database (SQLite) — dedicated integration file ---
      - DB_CHOICE=sqlite3
      - SQLITE_DB_FILE=/db/integration.sqlite3
      # --- Local S3 (MinIO) ---
      - S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin123
      - AWS_REGION=us-east-1
      - S3_PDF_BUCKET=koalixcrm-pdf-exports
      # --- Local SQS (ElasticMQ) ---
      - SQS_ENDPOINT_URL=http://elasticmq:9324
      - KOALIXCRM_MICROSERVICE_SQS=koalixcrm-microservice-sqs
      - CELERY_SQS=koalixcrm-celery-sqs
      - CELERY_BROKER_URL=sqs://dummy:dummy@elasticmq:9324
      - POLL_SLEEP_SECONDS=2
      - ENABLE_SQS_POLLER=true
      # --- Auth ---
      - SITE_URL=http://localhost:${DJANGO_PORT:-8000}
      # --- E2E test-only routes (also enabled here for integration test reuse) ---
      - E2E_TESTING=true
      - E2E_SECRET=local-e2e-secret
    expose:
      - "8000"
    volumes:
      - ${KOALIXCRM_HOST_DIR:-${KOALIXCRM_DIR:-./../koalixcrm}}:/usr/src/app
      - ${KOALIXCRM_DB_HOST_DIR:-${KOALIXCRM_DB_DIR:-./../koalixcrm_data}}/db:/db
    working_dir: /usr/src/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      minio-setup:
        condition: service_completed_successfully
      elasticmq:
        condition: service_started
    networks:
      koalixcrm-net:
        aliases:
          - backend
    profiles: [integration]

  # --- PDF export service (Java / Spring Boot) ---
  # Replaces the Python Celery worker for the PDF-export path.
  # Pulled as a pre-built image from GHCR. The sources and build pipeline live
  # in KoalixSwitzerland/koalixcrm-fop-service (extracted from koalixcrm to
  # separate Java and Python toolchains / QA). Pin a specific tag via
  # PDF_SERVICE_IMAGE_TAG in your .env.<name> — do not rely on `latest`.
  pdf-service:
    image: ghcr.io/koalixswitzerland/koalixcrm_pdf_service:${PDF_SERVICE_IMAGE_TAG:-develop}
    env_file:
      - path: ${KOALIXCRM_DB_DIR:-./../koalixcrm_data}/secrets.env
        required: true
    environment:
      # --- AWS region / credentials (dummy for local MinIO+ElasticMQ) ---
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin123
      # --- Local S3 (MinIO) ---
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_PDF_BUCKET=koalixcrm-pdf-exports
      - S3_PATH_STYLE_ACCESS=true
      # --- Local SQS (ElasticMQ) ---
      - SQS_ENDPOINT_URL=http://elasticmq:9324
      - KOALIXCRM_MICROSERVICE_SQS=koalixcrm-microservice-sqs
      # --- koalixCRM REST API (Java worker talks only to this) ---
      - KOALIXCRM_API_URL=http://backend:8000
      # --- OIDC M2M: intentionally NOT listed here. The values come from
      # secrets.env via env_file above. Adding them here with a ${VAR:-}
      # default would silently overwrite the secrets.env values with empty
      # strings when the host .env file doesn't define them (compose's
      # `environment:` wins over `env_file:`).
      - X_CUSTOM_ORIGIN_VERIFICATION_ON=${X_CUSTOM_ORIGIN_VERIFICATION_ON:-false}
      - X_CUSTOM_ORIGIN_VERIFICATION_KEY=${X_CUSTOM_ORIGIN_VERIFICATION_KEY:-}
      - LOG_LEVEL=${PDF_SERVICE_LOG_LEVEL:-INFO}
    depends_on:
      minio-setup:
        condition: service_completed_successfully
      elasticmq:
        condition: service_started
      # No depends_on backend: the `backend` alias is attached to either
      # backend (e2e/dev) or backend-integration (integration), depending on
      # profile. Listing one here would force it to start across every
      # profile. pdf-service only talks to backend lazily (on SQS messages),
      # so startup ordering isn't required; the Java HTTP client retries.
    networks:
      - koalixcrm-net
    profiles: [integration, e2e, dev]

  # --- Legacy Python Celery worker (kept for unit-celery tests only) ---
  # Removed from the integration/e2e/dev profiles in favour of `pdf-service`.
  # Scheduled for deletion in stage 5 of the Java migration
  # (KoalixSwitzerland/koalixcrm#386).
  celery:
    build:
      context: ${KOALIXCRM_DIR:-./../koalixcrm}
      dockerfile: docker/dev/Dockerfile.celery
    env_file:
      - path: ${KOALIXCRM_DB_DIR:-./../koalixcrm_data}/secrets.env
        required: true
    environment:
      - DJANGO_SETTINGS_MODULE=projectsettings.settings.development_docker_settings
      - DJANGO_SECRET_KEY=django-insecure-local-dev-key-DO-NOT-USE-IN-PRODUCTION
      - PYTHONUNBUFFERED=1
      - KOALIXCRM_LANGUAGE_CODE=${KOALIXCRM_LANGUAGE_CODE:-en-us}
      - DB_CHOICE=sqlite3
      - SQLITE_DB_FILE=/db/db.sqlite3
      - S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin123
      - AWS_REGION=us-east-1
      - S3_PDF_BUCKET=koalixcrm-pdf-exports
      - SQS_ENDPOINT_URL=http://elasticmq:9324
      - KOALIXCRM_MICROSERVICE_SQS=koalixcrm-microservice-sqs
      - CELERY_SQS=koalixcrm-celery-sqs
      - CELERY_BROKER_URL=sqs://dummy:dummy@elasticmq:9324
      - POLL_SLEEP_SECONDS=2
      - ENABLE_SQS_POLLER=true
    volumes:
      - ${KOALIXCRM_HOST_DIR:-${KOALIXCRM_DIR:-./../koalixcrm}}:/usr/src/app
      - ${KOALIXCRM_DB_HOST_DIR:-${KOALIXCRM_DB_DIR:-./../koalixcrm_data}}/db:/db
    working_dir: /usr/src/app
    depends_on:
      minio-setup:
        condition: service_completed_successfully
      elasticmq:
        condition: service_started
    networks:
      - koalixcrm-net
    profiles: [legacy-celery]

  # --- Allure report server (serves HTML reports for e2e results) ---
  allure-nginx:
    image: nginx:1.27-alpine
    volumes:
      - ${KOALIXCRM_SYSTEM_HOST_DIR:-${KOALIXCRM_SYSTEM_DIR:-.}}/docker/nginx-e2e.conf:/etc/nginx/nginx.conf:ro
      - allure_report:/usr/share/nginx/allure-report:ro
    ports:
      - "${ALLURE_PORT:-5001}:8080"
    networks:
      - koalixcrm-net
    profiles: [e2e]


# --- Test runners -------------------------------------------------------------

  # --- Django unit test runner (fast, SQLite, no infrastructure) ---
  # Default CMD runs full suite. Override by appending command after service name:
  #   docker compose --profile unit-django run --rm unit-django-runner pytest tests/accounting -v
  unit-django-runner:
    build:
      context: ${KOALIXCRM_DIR:-./../koalixcrm}
      dockerfile: docker/dev/Dockerfile.django
    # Django unit suite: excludes front-end (Selenium) and integration
    # (which needs live MinIO/ElasticMQ/backend/celery). Also ignores the
    # Celery-only microservice tests so the three test types do not overlap.
    command: ["pytest", "-m", "not front_end_tests and not integration", "--ignore=koalixcrm_microservices", "-v", "--tb=short", "--disable-warnings", "--continue-on-collection-errors", "--cov=koalixcrm", "--cov-report=xml:test_report/coverage.xml"]
    working_dir: /usr/src/app
    environment:
      - DJANGO_SETTINGS_MODULE=projectsettings.settings.development_docker_sqlite_settings
      - DJANGO_DEBUG=True
      - DJANGO_SECRET_KEY=django-insecure-unit-test-key
      - DB_CHOICE=sqlite3
      - SQLITE_DB_FILE=/tmp/unit-test.sqlite3
      - ALLOWED_HOSTS=localhost
      - PYTHONUNBUFFERED=1

      - AWS_REGION=us-east-1
      - S3_PDF_BUCKET=test-bucket
      - S3_ENDPOINT_URL=http://localhost:9000
      - SQS_ENDPOINT_URL=http://localhost:9324
      - KOALIXCRM_MICROSERVICE_SQS=koalixcrm-microservice-sqs
      - CELERY_SQS=koalixcrm-celery-sqs
    volumes:
      - ${KOALIXCRM_HOST_DIR:-${KOALIXCRM_DIR:-./../koalixcrm}}:/usr/src/app
    profiles: [unit-django]

  # --- Celery unit test runner (standalone microservice, no Django) ---
  # Tests only koalixcrm_microservices/ — the Celery worker has NO Django
  # dependency; all Django objects are retrieved via REST API.
  # Default CMD runs full suite. Override by appending command after service name.
  unit-celery-runner:
    build:
      context: ${KOALIXCRM_DIR:-./../koalixcrm}
      dockerfile: docker/dev/Dockerfile.celery
    # Celery unit suite: scans ONLY koalixcrm_microservices/ with Django
    # disabled — these tests have no Django dependency, matching the
    # Celery worker runtime which talks to the backend via REST.
    command: ["pytest", "koalixcrm_microservices/", "-v", "--tb=short", "--disable-warnings", "--override-ini=DJANGO_SETTINGS_MODULE=", "-p", "no:django", "--cov=koalixcrm_microservices", "--cov=koalixcrm_mq_commands", "--cov-report=xml:test_report/coverage-celery.xml"]
    working_dir: /usr/src/app
    environment:
      - PYTHONUNBUFFERED=1
      # --- Local S3/SQS for mocking ---
      - AWS_REGION=us-east-1
      - S3_PDF_BUCKET=test-bucket
      - S3_ENDPOINT_URL=http://localhost:9000
      - SQS_ENDPOINT_URL=http://localhost:9324
      - KOALIXCRM_MICROSERVICE_SQS=koalixcrm-microservice-sqs
      - CELERY_SQS=koalixcrm-celery-sqs
      # --- M2M API client config (mocked in unit tests) ---
      - CELERY_WORKER_M2M_OIDC_ISSUER=
      - CELERY_WORKER_M2M_CLIENT_ID=
      - CELERY_WORKER_M2M_CLIENT_SECRET=
      - KOALIXCRM_API_URL=http://localhost:8000
    volumes:
      - ${KOALIXCRM_HOST_DIR:-${KOALIXCRM_DIR:-./../koalixcrm}}:/usr/src/app
    profiles: [unit-celery]

  # --- Integration test runner ---
  # Default CMD runs full suite. Override by appending command after service name.
  integration-runner:
    build:
      context: ${KOALIXCRM_DIR:-./../koalixcrm}
      dockerfile: docker/dev/Dockerfile.django
    # Integration suite: tests marked with @pytest.mark.integration that need
    # live MinIO, ElasticMQ and the backend+celery services running.
    command: ["pytest", "tests/integration/", "-m", "integration", "-v", "--tb=short", "--disable-warnings", "--cov=koalixcrm", "--cov-report=xml:test_report/coverage.xml"]
    env_file:
      - path: ${KOALIXCRM_DB_DIR:-./../koalixcrm_data}/secrets.env
        required: true
    environment:
      # --- Django Core ---
      - DJANGO_SETTINGS_MODULE=projectsettings.settings.development_docker_settings
      - DJANGO_DEBUG=True
      - DJANGO_SECRET_KEY=django-insecure-local-dev-key-DO-NOT-USE-IN-PRODUCTION
      - ALLOWED_HOSTS=localhost,backend,host.docker.internal,127.0.0.1
      - PYTHONUNBUFFERED=1
      # --- Database (SQLite) — dedicated integration file, matches backend-integration ---
      - DB_CHOICE=sqlite3
      - SQLITE_DB_FILE=/db/integration.sqlite3
      # --- Local S3 (MinIO) ---
      - S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin123
      - AWS_REGION=us-east-1
      - S3_PDF_BUCKET=koalixcrm-pdf-exports
      # --- Local SQS (ElasticMQ) ---
      - SQS_ENDPOINT_URL=http://elasticmq:9324
      - KOALIXCRM_MICROSERVICE_SQS=koalixcrm-microservice-sqs
      - CELERY_SQS=koalixcrm-celery-sqs
      - CELERY_BROKER_URL=sqs://dummy:dummy@elasticmq:9324
      # --- Auth disabled locally ---

    volumes:
      - ${KOALIXCRM_HOST_DIR:-${KOALIXCRM_DIR:-./../koalixcrm}}:/usr/src/app
      - ${KOALIXCRM_DB_HOST_DIR:-${KOALIXCRM_DB_DIR:-./../koalixcrm_data}}/db:/db
    working_dir: /usr/src/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend-integration
      - pdf-service
    networks:
      - koalixcrm-net
    profiles: [integration]

  # --- E2E test runner (Selenium + allure) ---
  # Default CMD runs full suite. Override by appending command after service name:
  #   docker compose --profile e2e run --rm e2e-runner pytest tests/e2e/test_create_sales_document_from_quote.py -v
  e2e-runner:
    build:
      context: ${KOALIXCRM_DIR:-./../koalixcrm}
      dockerfile: docker/dev/Dockerfile.django
    command: >
      sh -c "
        pip install --no-cache-dir allure-pytest selenium &&
        echo 'Waiting for backend...' &&
        for i in $$(seq 1 30); do
          if python -c \"import urllib.request; urllib.request.urlopen('http://backend:8000/admin/')\" 2>/dev/null; then
            echo 'Backend is ready.';
            break;
          fi;
          echo \"  Attempt $$i/30...\";
          sleep 2;
        done &&
        pytest tests/e2e/ -m 'front_end_tests' -v --tb=short --alluredir=/allure-results
      "
    env_file:
      - path: ${KOALIXCRM_DB_DIR:-./../koalixcrm_data}/secrets.env
        required: true
    environment:
      # --- Django Core ---
      - DJANGO_SETTINGS_MODULE=projectsettings.settings.development_docker_settings
      - DJANGO_DEBUG=True
      - DJANGO_SECRET_KEY=django-insecure-local-dev-key-DO-NOT-USE-IN-PRODUCTION
      - ALLOWED_HOSTS=localhost,backend,host.docker.internal,127.0.0.1
      - PYTHONUNBUFFERED=1
      # --- Database (SQLite) ---
      - DB_CHOICE=sqlite3
      - SQLITE_DB_FILE=/db/db.sqlite3
      # --- Local S3 (MinIO) ---
      - S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin123
      - AWS_REGION=us-east-1
      - S3_PDF_BUCKET=koalixcrm-pdf-exports
      # --- Local SQS (ElasticMQ) ---
      - SQS_ENDPOINT_URL=http://elasticmq:9324
      - KOALIXCRM_MICROSERVICE_SQS=koalixcrm-microservice-sqs
      - CELERY_SQS=koalixcrm-celery-sqs
      - CELERY_BROKER_URL=sqs://dummy:dummy@elasticmq:9324
      # --- Auth disabled locally ---

      # --- E2E specific ---
      - E2E_BACKEND_URL=http://backend:8000
      - E2E_FRONTEND_URL=http://backend:8000
      - E2E_TESTING=true
      - E2E_SECRET=local-e2e-secret
      # --- Selenium (Firefox headless inside container) ---
      - SELENIUM_HEADLESS=true
    volumes:
      - ${KOALIXCRM_HOST_DIR:-${KOALIXCRM_DIR:-./../koalixcrm}}:/usr/src/app
      - ${KOALIXCRM_DB_HOST_DIR:-${KOALIXCRM_DB_DIR:-./../koalixcrm_data}}/db:/db
      - allure_results:/allure-results
      - allure_report:/allure-report
    working_dir: /usr/src/app
    depends_on:
      - backend
    networks:
      - koalixcrm-net
    profiles: [e2e]

  # --- pdf-export-service unit test runner (Java, fast, no infra) ---
  # Runs only classes whose name ends in *Test (the JUnit convention for unit
  # tests). Integration tests end in *IT and are excluded here.
  # Override the CMD to run a single test class:
  #   docker compose --profile unit-pdf-service run --rm unit-pdf-service-runner \
  #     gradle --no-daemon :pdf-export-service:test --tests net.koalix.pdf.xml.XmlAggregatorTest
  unit-pdf-service-runner:
    image: gradle:8.10-jdk21-alpine
    working_dir: /src
    command:
      - sh
      - -c
      - "gradle --no-daemon :pdf-export-service:test --tests '*Test'"
    volumes:
      - ${KOALIXCRM_FOP_HOST_DIR:-${KOALIXCRM_FOP_DIR:-./../koalixcrm-fop-service}}:/src
      - gradle_cache:/home/gradle/.gradle
      - gradle_cache:/root/.gradle
    environment:
      - GRADLE_USER_HOME=/home/gradle/.gradle
    profiles: [unit-pdf-service]

  # --- pdf-export-service integration test runner (Java + Testcontainers) ---
  # Runs the full :pdf-export-service:test task, which includes *IT classes
  # (TemplateFetcherIT, FopRendererIT). Those tests spawn sibling containers
  # (LocalStack, WireMock) via the host Docker socket — hence the /var/run/docker.sock
  # bind-mount and TESTCONTAINERS_HOST_OVERRIDE=host.docker.internal so
  # Testcontainers rewrites the endpoint URLs to be reachable from inside the
  # runner container.
  #
  # Prerequisite: host Docker daemon must be reachable at /var/run/docker.sock
  # (Docker Desktop on macOS/Windows: enabled by default. WSL2: see
  # https://docs.docker.com/desktop/wsl/).
  integration-pdf-service-runner:
    image: gradle:8.10-jdk21-alpine
    working_dir: /src
    command:
      - sh
      - -c
      - "gradle --no-daemon :pdf-export-service:test"
    volumes:
      - ${KOALIXCRM_FOP_HOST_DIR:-${KOALIXCRM_FOP_DIR:-./../koalixcrm-fop-service}}:/src
      - gradle_cache:/home/gradle/.gradle
      - gradle_cache:/root/.gradle
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - GRADLE_USER_HOME=/home/gradle/.gradle
      # Testcontainers: containers are started via the host daemon, so the
      # dynamic ports they publish are bound on the host, not on this runner.
      # Route endpoint URLs through host.docker.internal (exposed via
      # extra_hosts → host-gateway).
      - TESTCONTAINERS_HOST_OVERRIDE=host.docker.internal
      - TESTCONTAINERS_CHECKS_DISABLE=true
      - TESTCONTAINERS_RYUK_DISABLED=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - koalixcrm-net
    profiles: [integration-pdf-service]

  # --- Allure report generator (runs after e2e tests, generates HTML) ---
  allure-report-generator:
    image: frankescobar/allure-docker-service:latest
    environment:
      CHECK_RESULTS_EVERY_SECONDS: 5
      KEEP_HISTORY: "TRUE"
    volumes:
      - allure_results:/app/allure-results
      - allure_report:/app/default-reports
    networks:
      - koalixcrm-net
    profiles: [e2e]


# --- Volumes & networks ------------------------------------------------------

volumes:
  minio_data:
  allure_results:
  allure_report:
  gradle_cache:

networks:
  koalixcrm-net:
